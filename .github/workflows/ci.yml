on:
  push:
    branches:
      - "main"
  pull_request:

name: "CI"

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  ci:
    uses: "WebProject-xyz/.github/.github/workflows/ci.yml@923056ac2deedfddf562951d2e0f0cc7bcf278c2" # main
    secrets: inherit
    with:
      test-matrix: |
        [
          {"php-version": "8.3", "dependencies": "locked",  "with_coverage": true},
          {"php-version": "8.4", "dependencies": "highest", "with_coverage": false},
          {"php-version": "8.5", "dependencies": "highest", "with_coverage": false}
        ]
