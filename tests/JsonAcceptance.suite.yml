actor: AcceptanceTester
modules:
    enabled:
        - PhpBrowser:
            url: http://localhost:8081
        - REST:
            depends: PhpBrowser
        - Asserts
coverage:
    remote: true
    c3_url: http://localhost:8081/index.php
extensions:
    enabled:
        - Codeception\Extension\RunProcess:
            - OPENAPI_SPEC=data/openapi.json php -S localhost:8081 -t public
