openapi: 3.0.0
info:
  title: Sample API
  version: 1.0.0
servers:
  - url: /
paths:
  /users:
    get:
      summary: Get all users
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
              example:
                - id: 1
                  name: Alice
                - id: 2
                  name: Bob
  /users/{id}:
    get:
      summary: Get a user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: A single user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
              example:
                id: 1
                name: Alice
  /disabled-resource:
    get:
      summary: Disabled GET endpoint (API Platform pattern)
      responses:
        '404':
          description: Resource not available via GET
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/{id}/tasks:
    post:
      summary: Create a task for a user (async)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskInput'
      responses:
        '202':
          description: Task accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAccepted'
              example:
                taskId: abc-123
                status: pending
    delete:
      summary: Delete all tasks for a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Tasks deleted successfully
components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
    TaskInput:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    TaskAccepted:
      type: object
      properties:
        taskId:
          type: string
        status:
          type: string
    Error:
      type: object
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: integer
